<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — GradientTech</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .orders-page { padding: 48px 0 80px; }

    .page-header { padding: 48px 0 40px; background: var(--surface-2); border-bottom: 1px solid var(--border); margin-bottom: 40px; }

    .orders-grid { display: flex; flex-direction: column; gap: 20px; }

    .order-card {
      background: #120a3a;
      border: 1.5px solid rgba(124, 95, 230, 0.25);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: var(--transition);
      animation: fadeIn 0.4s ease;
    }

    .order-card:hover { border-color: rgba(124, 95, 230, 0.5); box-shadow: var(--shadow-md); }

    .order-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 24px;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(124, 95, 230, 0.15);
      background: rgba(30, 15, 102, 0.5);
    }

    .order-meta-label { font-size: 0.72rem; color: #8b7fd4; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 4px; }
    .order-meta-val { font-size: 0.9rem; font-weight: 600; color: #f0eeff; }

    .order-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .status-confirmed { background: #DCFCE7; color: #16A34A; }
    .status-shipped { background: #DBEAFE; color: #1D4ED8; }
    .status-delivered { background: linear-gradient(135deg, rgba(153,15,250,0.12), rgba(230,0,118,0.12)); color: var(--primary); }
    .status-cancelled { background: #FEE2E2; color: #DC2626; }

    .order-toggle {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: white;
      border: 1.5px solid var(--border);
      cursor: pointer;
      font-size: 0.75rem;
      transition: var(--transition);
      color: var(--text-3);
    }
    .order-toggle:hover { border-color: var(--primary); color: var(--primary); }
    .order-toggle.open { transform: rotate(180deg); }

    .order-items {background: #120a3a; padding: 20px 24px; display: none; }
    .order-items.open { display: block; animation: fadeIn 0.25s ease; }

    .order-item-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(124, 95, 230, 0.1);
    }
    .order-item-row:last-child { border-bottom: none; }

    .order-item-img { width: 56px; height: 44px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0; background: var(--surface-2); }
    .order-item-name { flex: 1; font-size: 0.875rem; font-weight: 600; color: #c4b8ff;}
    .order-item-qty { font-size: 0.8rem; color: #8b7fd4; }
    .order-item-price { font-weight: 700; font-size: 0.9rem; color: #ffffff; }

    .order-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid rgba(124, 95, 230, 0.15);
      background: rgba(30, 15, 102, 0.3);
    }

    .order-total-label { font-size: 0.85rem; color: #8b7fd4; }
    .order-total-val { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    @media (max-width: 768px) {
      .order-header { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .order-header { grid-template-columns: 1fr; gap: 14px; }
    }
  </style>
</head>
<body>
  <div id="navbar-mount"></div>
  <div class="page-wrapper">
    <div class="page-header">
      <div class="container">
        <div class="section-tag">✦ Order History</div>
        <h1 class="section-title">My <span class="gradient-text">Orders</span></h1>
        <p style="color:var(--text-3);font-size:0.95rem">Track and manage your orders</p>
      </div>
    </div>
    <div class="orders-page">
      <div class="container">
        <div id="orders-content">
          <div class="loading-wrap"><div class="spinner"></div><span>Loading orders...</span></div>
        </div>
      </div>
    </div>
  </div>
  <div id="footer-mount"></div>
  <div id="toast-container"></div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('navbar-mount').innerHTML = navbarHTML('');
    document.getElementById('footer-mount').innerHTML = footerHTML();
    initNavbar('');

    if (!Auth.isLoggedIn()) {
      window.location.href = '/auth.html';
    }

    const STATUS_CLASSES = {
      confirmed: 'status-confirmed',
      shipped: 'status-shipped',
      delivered: 'status-delivered',
      cancelled: 'status-cancelled'
    };

    const STATUS_ICONS = { confirmed: '✓', shipped: '🚚', delivered: '📦', cancelled: '✕' };

    async function loadOrders() {
      try {
        const data = await apiFetch('/orders');
        const content = document.getElementById('orders-content');

        if (!data.orders || data.orders.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📦</div>
              <h3>No orders yet</h3>
              <p>When you place your first order, it will appear here.</p>
              <a href="/products.html" class="btn-primary" style="margin-top:16px;display:inline-flex;align-items:center;gap:8px">Start Shopping →</a>
            </div>`;
          return;
        }

        content.innerHTML = `<div class="orders-grid stagger">${data.orders.map(order => `
          <div class="order-card">
            <div class="order-header">
              <div>
                <div class="order-meta-label">Order Number</div>
                <div class="order-meta-val">${order.orderNumber}</div>
              </div>
              <div>
                <div class="order-meta-label">Date</div>
                <div class="order-meta-val">${new Date(order.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}</div>
              </div>
              <div>
                <div class="order-meta-label">Status</div>
                <span class="order-status ${STATUS_CLASSES[order.status] || 'status-confirmed'}">
                  ${STATUS_ICONS[order.status] || '✓'} ${order.status.charAt(0).toUpperCase() + order.status.slice(1)}
                </span>
              </div>
              <button class="order-toggle" onclick="toggleOrder(this)" title="View items">▼</button>
            </div>

            <div class="order-items">
              ${order.items.map(item => `
                <div class="order-item-row">
                  <img class="order-item-img" src="${item.image}" alt="${item.name}">
                  <div class="order-item-name">${item.name}</div>
                  <div class="order-item-qty">× ${item.quantity}</div>
                  <div class="order-item-price">${formatPrice(item.total)}</div>
                </div>
              `).join('')}
            </div>

            <div class="order-footer">
              <div>
                <div class="order-total-label">Order Total</div>
                <div class="order-total-val">${formatPrice(order.total)}</div>
              </div>
              <div style="font-size:0.8rem;color:var(--text-3);text-align:right">
                Estimated delivery:<br>
                <strong style="color:var(--text)">${new Date(order.estimatedDelivery).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</strong>
              </div>
            </div>
          </div>
        `).join('')}</div>`;

      } catch (err) {
        document.getElementById('orders-content').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <h3>Could not load orders</h3>
            <p>${err.message}</p>
          </div>`;
      }
    }

    function toggleOrder(btn) {
      const items = btn.closest('.order-card').querySelector('.order-items');
      items.classList.toggle('open');
      btn.classList.toggle('open');
    }

    loadOrders();
  </script>
</body>
</html>
