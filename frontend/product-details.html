<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — GradientTech</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .detail-page { padding: 48px 0 80px; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.825rem;
      color: var(--text-3);
      margin-bottom: 36px;
    }
    .breadcrumb a { color: var(--primary); }
    .breadcrumb a:hover { text-decoration: underline; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 64px;
      align-items: start;
      margin-bottom: 80px;
    }

    /* Image */
    .detail-img-wrap {
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--surface-2);
      position: sticky;
      top: calc(var(--nav-height) + 24px);
    }
    .detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

    /* Info */
    .detail-cat {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .detail-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.25rem);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 14px;
      line-height: 1.1;
    }

    .detail-rating {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-stars { color: #F59E0B; font-size: 1.1rem; }
    .detail-reviews { font-size: 0.85rem; color: var(--text-3); }

    .detail-price-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 20px 24px;
      background: var(--surface-2);
      border-radius: var(--radius-lg);
    }

    .detail-price {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .detail-original { font-size: 1rem; color: var(--text-4); text-decoration: line-through; }

    .discount-badge {
      padding: 4px 12px;
      background: #DCFCE7;
      color: #16A34A;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .detail-desc {
      font-size: 0.95rem;
      color: var(--text-2);
      line-height: 1.75;
      margin-bottom: 24px;
    }

    /* Specs */
    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .spec-item {
      background: #120a3a;
      border: 1.5px solid rgba(124, 95, 230, 0.25);
      border-radius: 12px;
      padding: 12px 16px;
    }
    .spec-label {color: #8b7fd4;font-size: 0.72rem;text-transform: uppercase;letter-spacing: 0.05em;font-weight: 600;margin-bottom: 4px;}
    .spec-val {font-size: 0.875rem;font-weight: 600;color: #f0eeff;}

    /* Stock */
    .stock-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .stock-dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; }
    .stock-dot.low { background: #F59E0B; }
    .stock-dot.out { background: #EF4444; }

    /* Add to cart */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .qty-btn {
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--text-2);
      background: var(--surface-2);
      cursor: pointer;
      transition: var(--transition);
    }

    .qty-btn:hover { background: var(--gradient-soft); color: var(--primary); }
    .qty-val { width: 48px; text-align: center; font-weight: 600; font-size: 0.95rem; }

    .add-cart-btn {
      flex: 1;
      padding: 14px 28px;
      background: var(--gradient);
      color: white;
      border-radius: var(--radius-full);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      box-shadow: var(--shadow-glow);
    }

    .add-cart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(153,15,250,0.45); }

    /* Guarantees */
    .guarantees {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 24px;
    }

    .guarantee-item {
      text-align: center;
      padding: 14px 10px;
      background: var(--surface-2);
      border-radius: var(--radius-md);
    }

    .guarantee-item .g-icon { font-size: 1.4rem; margin-bottom: 6px; }
    .guarantee-item .g-text { font-size: 0.72rem; font-weight: 600; color: var(--text-2); }

    /* Related */
    .related-section { border-top: 1px solid var(--border); padding-top: 64px; }
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 36px; }

    @media (max-width: 900px) {
      .detail-grid { grid-template-columns: 1fr; gap: 32px; }
      .detail-img-wrap { position: relative; top: auto; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .related-grid { grid-template-columns: 1fr; }
      .specs-grid { grid-template-columns: 1fr; }
      .guarantees { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="navbar-mount"></div>
  <div class="page-wrapper">
    <div class="detail-page">
      <div class="container">
        <div id="product-content">
          <div class="loading-wrap"><div class="spinner"></div><span>Loading product...</span></div>
        </div>
      </div>
    </div>
  </div>
  <div id="footer-mount"></div>
  <div id="toast-container"></div>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('navbar-mount').innerHTML = navbarHTML('products');
    document.getElementById('footer-mount').innerHTML = footerHTML();
    initNavbar('products');

    const productId = new URLSearchParams(window.location.search).get('id');

    async function loadProduct() {
      if (!productId) {
        document.getElementById('product-content').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>Product not found</h3>
            <a href="/products.html" class="btn-primary" style="margin-top:16px">Browse Products</a>
          </div>`;
        return;
      }

      try {
        const { product, related } = await apiFetch(`/products/${productId}`);
        document.title = `${product.name} — GradientTech`;

        let qty = 1;
        const discountPct = product.originalPrice > product.price
          ? Math.round((1 - product.price / product.originalPrice) * 100)
          : 0;

        const specsHTML = Object.entries(product.specs || {}).map(([k, v]) => `
          <div class="spec-item">
            <div class="spec-label">${k}</div>
            <div class="spec-val">${v}</div>
          </div>
        `).join('');

        const relatedHTML = related.length ? related.map(p => renderProductCard(p)).join('') : '';

        document.getElementById('product-content').innerHTML = `
          <div class="breadcrumb fade-in">
            <a href="/index.html">Home</a> /
            <a href="/products.html">Products</a> /
            <a href="/products.html?category=${product.category.toLowerCase()}">${product.category}</a> /
            <span>${product.name}</span>
          </div>

          <div class="detail-grid fade-in">
            <div class="detail-img-wrap">
              <img src="${product.image}" alt="${product.name}">
            </div>

            <div class="detail-info">
              <div class="detail-cat">${product.category}</div>
              <h1 class="detail-title">${product.name}</h1>

              <div class="detail-rating">
                <span class="detail-stars">${renderStars(product.rating)}</span>
                <span style="font-weight:700">${product.rating}</span>
                <span class="detail-reviews">(${product.reviews.toLocaleString()} reviews)</span>
              </div>

              <div class="detail-price-row">
                <span class="detail-price">${formatPrice(product.price)}</span>
                ${product.originalPrice > product.price ? `<span class="detail-original">${formatPrice(product.originalPrice)}</span><span class="discount-badge">-${discountPct}%</span>` : ''}
              </div>

              <p class="detail-desc">${product.description}</p>

              ${specsHTML ? `<div class="specs-grid">${specsHTML}</div>` : ''}

              <div class="stock-indicator">
                <div class="stock-dot ${product.stock <= 5 ? 'low' : ''}"></div>
                <span>${product.stock > 10 ? 'In Stock' : product.stock > 0 ? `Only ${product.stock} left` : 'Out of Stock'}</span>
              </div>

              <div class="qty-row">
                <div class="qty-control">
                  <button class="qty-btn" onclick="changeQty(-1)">−</button>
                  <div class="qty-val" id="qty-display">1</div>
                  <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <button class="add-cart-btn" onclick="addToCart()">
                  🛒 Add to Cart
                </button>
              </div>

              <div class="guarantees">
                <div class="guarantee-item"><div class="g-icon">🚚</div><div class="g-text">Free Shipping $500+</div></div>
                <div class="guarantee-item"><div class="g-icon">↩️</div><div class="g-text">30-Day Returns</div></div>
                <div class="guarantee-item"><div class="g-icon">🔒</div><div class="g-text">Secure Checkout</div></div>
              </div>
            </div>
          </div>

          ${relatedHTML ? `
          <div class="related-section">
            <div class="section-tag">✦ You May Also Like</div>
            <div class="section-title">Related <span class="gradient-text">Products</span></div>
            <div class="related-grid stagger">${relatedHTML}</div>
          </div>` : ''}
        `;

        window._currentProduct = product;

        window.changeQty = function(delta) {
          qty = Math.max(1, Math.min(qty + delta, product.stock));
          document.getElementById('qty-display').textContent = qty;
        };

        window.addToCart = function() {
          Cart.add(product, qty);
        };

      } catch (err) {
        document.getElementById('product-content').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <h3>Product not found</h3>
            <p>${err.message}</p>
            <a href="/products.html" class="btn-primary" style="margin-top:16px">Browse Products</a>
          </div>`;
      }
    }

    loadProduct();
  </script>
</body>
</html>
